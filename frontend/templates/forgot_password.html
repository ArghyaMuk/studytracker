<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPilot - Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>StudyPilot</h1>
            <p class="subtitle">Reset your password</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endwith %}
            <form method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="Enter your registered email">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" required minlength="8" placeholder="Min 8 chars, uppercase, lowercase, digit, special">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" name="confirm_password" required minlength="8" placeholder="Re-enter new password">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Reset Password</button>
            </form>
            <p class="link"><a href="{{ url_for('login') }}">← Back to Login</a></p>
        </div>
    </div>
</body>
</html>
