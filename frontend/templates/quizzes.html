{% extends "base.html" %}
{% block title %}Quizzes{% endblock %}
{% block content %}
<h1>Quizzes</h1>
<p style="color:var(--text-muted);margin-bottom:24px">Generate AI-powered quizzes from your syllabus</p>

<div class="card">
    <h3>🤖 Generate Quiz with AI</h3>
    <form method="POST" action="{{ url_for('generate_quiz') }}" style="margin-top:12px">
        <div class="form-row">
            <div class="form-group">
                <label>Subject Code</label>
                <input type="text" name="subject_code" required placeholder="e.g. CS301">
            </div>
            <div class="form-group">
                <label>Unit Number</label>
                <input type="number" name="unit_number" value="1" min="1" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Number of Questions</label>
                <input type="number" name="count" value="5" min="1" max="20">
            </div>
            <div class="form-group">
                <label>Difficulty</label>
                <select name="difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Mode</label>
            <select name="mode">
                <option value="mcq">MCQ</option>
                <option value="viva">Viva Q&A</option>
            </select>
        </div>
        <button type="submit" class="btn btn-purple">✨ Generate Quiz</button>
    </form>
</div>
{% endblock %}
