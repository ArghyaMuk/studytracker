<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPilot - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>StudyPilot</h1>
            <p class="subtitle">Create your account</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endwith %}
            <form method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required minlength="8" placeholder="Min 8 chars, uppercase, lowercase, digit, special">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>College</label>
                        <input type="text" name="college">
                    </div>
                    <div class="form-group">
                        <label>University</label>
                        <input type="text" name="university">
                    </div>
                </div>
                <div class="form-group">
                    <label>Current Semester</label>
                    <select name="current_semester">
                        {% for s in range(1, 9) %}
                        <option value="{{ s }}">Semester {{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
            </form>
            <p class="link">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
        </div>
    </div>
</body>
</html>
